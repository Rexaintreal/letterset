<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Map letters - Letterset</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <script>
            tailwind.config = {
                theme: {
                    extend: {
                        colors: {
                            paper:  '#fdfbf7',
                            pencil: '#2d2d2d',
                            muted:  '#e5e0d8',
                            red:    '#ff4d4d',
                            blue:   '#2d5da1',
                            yellow: '#fff9c4',
                        },
                        fontFamily: {
                            hand:   ['Patrick Hand', 'cursive'],
                            marker: ['Kalam', 'cursive'],
                        }
                    }
                }
            }
        </script>
        <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
        <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&family=Patrick+Hand&display=swap" rel="stylesheet">
    </head>
    <body>
        <nav class="nav-bar">
            <a href="/" class="nav-logo">Letterset</a>
            <button class="nav-hamburger" id="navToggle" aria-label="Menu">
                <span></span><span></span><span></span>
            </button>
            <div class="nav-links" id="navLinks">
                <a href="/upload" class="btn-primary">Start over</a>
            </div>
        </nav>
        <main class="map-main">
            <div class="map-header">
                <h1 class="upload-title">Check your letters</h1>
                <p class="upload-sub">We found these characters in your sheet. Fix any labels that look wrong, then hit continue.</p>
            </div>
            <div class="glyph-grid" id="glyphGrid">
                <p class="map-placeholder" id="mapPlaceholder">Loading Glyphs....</p>
            </div>
            <div class="map-actions">
                <a href="/preview/{{ session_id }}" class="btn-primary">Looks good, build my font →</a>
            </div>
        </main>
        <script src="{{ url_for('static', filename='js/script.js') }}"></script>
        <script>
            const SESSION_ID = " {{ session_id }}".trim();
            const CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789.,!?()-_/@#&+'.split('');
            fetch(`/glyphs/${SESSION_ID}`).then(r => r.json()).then(data => {
                const grid = document.getElementById('glyphGrid');
                document.getElementById('mapPlaceholder').remove();
                data.glyphs.forEach(g => {
                    const div = document.createElement('div');
                    div.style.cssText = 'display:flex;flex-direction:column;align-items:center;gap:4px;';
                    div.innerHTML = `<img src="/glyph_img/${SESSION_ID}/${g.code}" style="width:56px;height:56px;border:1px solid #e5e0d8;border-radius:4px;background:white;object-fit:contain;">
                    <span style="font-size:0.75rem;color:#aaa;">${g.char}</span>`;
                    grid.appendChild(div);
                });
            });
        </script>
    </body>
</html>
