<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Draw - Letterset</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <script>
            tailwind.config = {
                theme: {
                    extend: {
                        colors: {
                            paper:  '#fdfbf7',
                            pencil: '#2d2d2d',
                            muted:  '#e5e0d8',
                            red:    '#ff4d4d',
                            blue:   '#2d5da1',
                            yellow: '#fff9c4',
                        },
                        fontFamily: {
                            hand:   ['Patrick Hand', 'cursive'],
                            marker: ['Kalam', 'cursive'],
                        }
                    }
                }
            }
        </script>
        <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
        <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&family=Patrick+Hand&display=swap" rel="stylesheet">
    </head>
    <body data-page="draw" style="overflow:hidden; height:100vh; display:flex; flex-direction:column;">
        <nav class="nav-bar">
            <a href="/" class="nav-logo">Letterset</a>
            <button class="nav-hamburger" id="navToggle" aria-label="Menu">
                <span></span><span></span><span></span>
            </button>
            <div class="nav-links" id="navLinks">
                <a href="/" class="btn-secondary">Cancel</a>
                <a href="/draw" class="btn-secondary" onclick="return confirm('Start over? Your drawings will be lost.')">↺ Restart</a>
            </div>
        </nav>
        <main style="display:flex; gap:1.5rem; padding:1.25rem 2rem; flex:1; min-height:0; box-sizing:border-box; align-items:stretch;">
        <div style="display:flex; flex-direction:column; gap:0.75rem; flex:1.2; min-width:0; min-height:0;">
        <div class="draw-meta" style="flex-shrink:0;">
            <div class="progress-ring-wrap">
                        <svg class="progress-ring" viewBox="0 0 120 120" width="120" height="120">
                            <circle class="ring-track" cx="60" cy="60" r="50"/>
                            <circle class="ring-skipped" id="ringSkipped" cx="60" cy="60" r="50"/>
                            <circle class="ring-done" id="ringDone" cx="60" cy="60" r="50"/>
                        </svg>
                        <div class="ring-label">
                            <span class="ring-count" id="ringCount">0</span>
                            <span class="ring-total" id="ringTotal">/ 74</span>
                        </div>
                    </div>
                    <h1 class="draw-prompt" style="font-size:clamp(1.4rem, 3vw, 2.5rem); margin:0.1rem 0;">Draw: <span id="currentChar">A</span></h1>
                    <p class="draw-hint" style="margin:0;">Fill the box naturally — don't worry about size.</p>
                    <p class="draw-hint" style="margin:0; opacity:0.6;">Enter = next &nbsp;·&nbsp; ← = back &nbsp;·&nbsp; Backspace = clear</p>
                    <div class="ring-legend">
                        <span id="legendDone">0 drawn</span>
                        &nbsp;·&nbsp;
                        <span id="legendSkipped">0 skipped</span>
                    </div>
                </div>
                <span id="drawProgress" style="display:none;"></span>
                <div id="charGrid" style="display:flex; flex-wrap:wrap; gap:3px; flex-shrink:0;"></div>
                <div class="draw-toolbar" style="flex-shrink:0;">
                    <span class="tool-label">Brush size</span>
                    <input type="range" min="4" max="28" value="8" id="brushSlider" class="preview-slider" style="width:140px;">
                    <span class="tool-label" id="brushVal">8px</span>
                    <button class="tool-mode-btn active" id="penBtn" title="Pen">Pen</button>
                    <button class="tool-mode-btn" id="eraserBtn" title="Eraser">Eraser</button>
                </div>
                <div class="draw-canvas-wrap" style="flex:1; min-height:0; display:flex;">
                    <canvas id="drawCanvas" class="draw-canvas" style="width:100%; height:100%; display:block;"></canvas>
                </div>
                <div class="draw-actions" style="flex-shrink:0;">
                    <button class="btn-secondary" id="backBtn">← Back</button>
                    <button class="btn-secondary" id="clearBtn">Clear</button>
                    <button class="btn-secondary" id="undoBtn">↩ Undo</button>
                    <button class="btn-secondary" id="skipBtn">Skip</button>
                    <button class="btn-primary" id="nextBtn">Next →</button>
                </div>
            </div>
            <div class="draw-preview-side" style="flex:1; min-width:0; display:flex; flex-direction:column; gap:0.5rem;">
                <span class="tool-label" style="font-size:0.85rem; flex-shrink:0;">So far</span>
                <div id="previewChars" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(72px, 1fr)); gap:4px; align-content:start;"></div>
            </div>
        </main>
        <script>const SESSION_ID = "{{ session_id }}";</script>
        <script src="{{ url_for('static', filename='js/script.js') }}"></script>
    </body>
</html>>
