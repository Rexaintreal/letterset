<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Letterset</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <script>
            tailwind.config = {
                theme: {
                    extend: {
                        colors: {
                            paper:  '#fdfbf7',
                            pencil: '#2d2d2d',
                            muted:  '#e5e0d8',
                            red:    '#ff4d4d',
                            blue:   '#2d5da1',
                            yellow: '#fff9c4',
                        },
                        fontFamily: {
                            hand:   ['Patrick Hand', 'cursive'],
                            marker: ['Kalam', 'cursive'],
                        }
                    }
                }
            }
        </script>
        <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
        <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&family=Patrick+Hand&display=swap" rel="stylesheet">
    </head>
    <body>
        <nav class="nav-bar">
            <a href="/" class="nav-logo">Letterset</a>
            <a href="/upload" class="btn-primary">Make my font</a>
        </nav>
        <section class="hero">
            <div class="hero-text">
                <h1 class="hero-title">Turn your handwriting<br>into a real font.</h1>
                <p class="hero-sub">Print a template. Write every letter. Upload a photo.</p>
                <div class="hero-buttons">
                    <a href="/upload" class="btn-primary">Make a font -></a>
                    <a href="#how" class="btn-secondary">See how it works</a>
                </div>
            </div>
            <div class="hero-arrow">
                <svg width="120" height="80" viewBox="0 0 120 80" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M10 20 C 30 10, 80 10, 100 40 C 110 55, 105 65, 95 68" stroke="#2d2d2d" stroke-width="2.5" stroke-linecap="round" fill="none"/>
                    <path d="M95 68 L 88 58 M 95 68 L 105 60" stroke="#2d2d2d" stroke-width="2.5" stroke-linecap="round"/>
                </svg>
            </div>
        </section>
    </body>
</html>
